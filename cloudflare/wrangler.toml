name = "backoffice"
main = "src/index.js"
compatibility_date = "2026-05-01"
account_id = "7e47fe5134a4b77582cf7746bff3fb62"

# Secrets (set with `wrangler secret put <NAME>`):
#   ANTHROPIC_API_KEY — enables /ai/categorize (M7); without it the route returns
#                       501 and the app simply hides nothing — the button explains.
#   SYNC_TOKEN        — enables POST /sync/inbound (M11, Muse → Back Office). The same
#                       value goes into Muse's Settings → Integrations → Back Office sync
#                       card. Unset = the route answers 503 (sync off).
#   HELCIM_API_TOKEN  — enables GET /b/:biz/processor/helcim/transactions (M13 deposit
#                       matching, Helcim API fallback). Same token the Muse Worker uses.
#                       Unset = the route answers 501; books-first matching still works.
#   PLAID_SECRET      — enables /b/:biz/plaid/* (bank feed). The Plaid Sandbox secret
#                       while testing, then the Production secret to go live. Unset =
#                       the routes answer 501. Set the matching PLAID_ENV var below.
# Optional vars: AI_MODEL (defaults to claude-opus-4-8; e.g. claude-haiku-4-5 for cheaper batches)

[vars]
# AI categorize model — Haiku 4.5 ($1/$5 per 1M tok) for cheap, high-volume
# bank-row classification. Override to claude-opus-4-8 for max accuracy.
AI_MODEL = "claude-haiku-4-5"
# Plaid bank feed (the secret is PLAID_SECRET, set via `wrangler secret put`).
PLAID_CLIENT_ID = "6a2eb9669d3c7c000eacc5e0"
PLAID_ENV = "production"   # live bank data — needs the PRODUCTION secret + the redirect URI registered in the Plaid dashboard
PLAID_REDIRECT_URI = "https://musenail.github.io/BackOffice/"
# PLAID_WEBHOOK_URL — add when wiring webhook/cron auto-sync.

[durable_objects]
bindings = [
  { name = "BUSINESS_DO", class_name = "BusinessDO" },
  { name = "REGISTRY_DO", class_name = "RegistryDO" },
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BusinessDO", "RegistryDO"]

[[r2_buckets]]
binding = "FILES"
bucket_name = "backoffice-files"
